# Document register — the SINGLE source of truth for every official document on the file.
# sources/README.md is its *rendered* table (edit this YAML, then mirror the table; never the table alone).
#
# DIRECTIVE ADAPTATION: documents span two layers — the EU instrument (directive, infringement) and the
# NL transposition (Kamerstukken 36924, the AMvB, consultation responses, AFM material). `body` is the
# issuing institution: European Commission | Tweede Kamer | Eerste Kamer | Raad van State |
# Ministerie van Financiën | AFM | VFN | <stakeholder>.
#
# Field reference:
#   id            stable institutional id (CELEX, 36924-<n>, INF-…, etc.)
#   title         quoted descriptive title
#   body          issuing institution
#   date          ISO YYYY-MM-DD
#   url           authoritative URL (also: celex)
#   local         committed file path, if any
#   access        omit = fully public; else cite-only | not-public | public-via-national-parliament
#   notes         prose context (a `>-` block)

