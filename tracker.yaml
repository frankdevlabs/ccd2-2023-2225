    T1-08:
      tier: T1
      kind: institutional
      label: "EU Commission — infringement press corner (CCD2 / NL)"
      url: "https://ec.europa.eu/commission/presscorner/detail/en/inf_26_115"
      affects: [docs/infringement.md, STATUS.md, TIMELINE.md]
