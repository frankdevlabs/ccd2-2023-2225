    T1-04:
      tier: T1
      kind: institutional
      label: "Wetgevingskalender — wet (WGK026364)"
      url: "https://wetgevingskalender.overheid.nl/Regeling/WGK026364"
      affects: [STATUS.md, TIMELINE.md]
    T1-05:
      tier: T1
      kind: institutional
      label: "Wetgevingskalender — Implementatiebesluit (WGK026387)"
      url: "https://wetgevingskalender.overheid.nl/Regeling/WGK026387"
      affects: [docs/transposition/implementatiebesluit.md, TIMELINE.md]
    T1-06:
      tier: T1
      kind: institutional
      label: "internetconsultatie — Implementatiebesluit"
      url: "https://www.internetconsultatie.nl/implementatiebesluitrichtlijnconsumentenkrediet/b1"
