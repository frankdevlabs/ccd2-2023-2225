# ============================================================================
# tracker.yaml — the SINGLE source of truth for this tracker's file identity.
#
# This is the one place that says *which* EU file this repo follows. Everything
# else (CLAUDE.md, README.md, STATUS.md, the skills' scope checks) reads from
# here or is filled from here by `python3 bootstrap.py`.
#
# DIRECTIVE ADAPTATION (first directive in the family) ------------------------
# The template ships shaped for a REGULATION in the Ordinary Legislative
# Procedure (proposal -> Council/Parliament compromise -> adoption). This file
# is a DIRECTIVE whose EU process is already FINISHED (adopted 18 Oct 2023). The
# live tracking is (a) national TRANSPOSITION in the Netherlands and (b) EU
# INFRINGEMENT. So:
#   * `proposal:` is repurposed to identify the ADOPTED directive (keeps the
#     bootstrap token-fill working).
#   * new top-level keys `instrument_type`, `directive:`, `transposition:`,
#     `infringement:` carry the directive-specific facts (bootstrap ignores
#     keys it doesn't know).
#   * `extracts/commission/` -> `extracts/directive/` (the adopted text, the
#     diff baseline) and `extracts/council/` -> `extracts/transposition-nl/`
#     (the Dutch implementing text, versioned across bill stages).
# See CLAUDE.md "Directive adaptation" for the full mapping.
# ============================================================================

# --- Identity ---------------------------------------------------------------
file_id: "Directive (EU) 2023/2225 (CCD2)"
short_name: "Consumer Credit Directive II (CCD2) — NL implementation"
strand: "Consumer credit: BNPL / credit cards / authorised overdrafts into scope, creditworthiness test recast, ban on credit to minors, advertising rules"
instrument_type: "Directive"              # NEW — marks this as a directive tracker (vs Regulation)

# proposal: repurposed to identify the ADOPTED directive (drives the bootstrap
# tokens <PROPOSAL-ID>/<DATE>/<EUR-LEX-URL>/<OEIL-URL>).
proposal:
  id: "Directive (EU) 2023/2225"
  date: "2023-10-18"                       # adopted (Strasbourg)
  celex: "https://eur-lex.europa.eu/eli/dir/2023/2225/oj"
  oeil: "https://eur-lex.europa.eu/legal-content/EN/NIM/?uri=CELEX:32023L2225"   # national transposition (NIM) page

# --- The EU instrument (already adopted) ------------------------------------
directive:
  celex: "32023L2225"
  eli: "https://eur-lex.europa.eu/eli/dir/2023/2225/oj"
  adopted: "2023-10-18"
  in_force: "2023-11-19"                   # 20th day after OJ publication (Art 49)
  oj: "OJ L, 2023/2225, 30 October 2023"
  transposition_deadline: "2025-11-20"     # Art 48
  application_date: "2026-11-20"           # Art 48
  repeals: "Directive 2008/48/EC (CCD1) — with effect from 2026-11-20 (Art 47, transitional regime for existing open-end agreements)"
  nim_page: "https://eur-lex.europa.eu/legal-content/EN/NIM/?uri=CELEX:32023L2225"

# Sibling file(s) easy to confuse with this one — must NOT be tracked here.
# Drives the scope-guard text in CLAUDE.md/README and the skills' scope rule.
keep_apart:
  - file_id: "Directive 2008/48/EC (CCD1)"
    note: "CCD1 — the directive CCD2 repeals from 20 Nov 2026; its (closed) legislative process is not tracked here. Also keep apart: the NPL Implementatiewet kredietservicers en kredietkopers (Directive 2021/2167) and the Wetsvoorstel kredietregistratie (WGK025409) — adjacent NL files, not this one."

legal_bases: ["Article 114 TFEU"]          # largely maximum harmonisation (Art 42 lists Member-State options)

# Existing laws this file interfaces with / amends. For a DIRECTIVE the relevant
# instruments are the repealed predecessor + the NATIONAL laws the transposition
# amends. Drives docs/instruments/ pages.
instruments:
  - { name: "CCD1 — Consumer Credit Directive", celex: "2008/48/EC" }
  - { name: "Wet op het financieel toezicht (Wft)", celex: "NL" }
  - { name: "Burgerlijk Wetboek Boek 7 (BW)", celex: "NL" }
  - { name: "Wet handhaving consumentenbescherming", celex: "NL" }
  - { name: "Overgangswet nieuw Burgerlijk Wetboek", celex: "NL" }

# --- The live tracking: national transposition ------------------------------
transposition:
  jurisdiction: "Netherlands"
  wet:
    dossier: "36924"
    title: "Implementatiewet herziene richtlijn consumentenkrediet"
    ministry: "Ministerie van Financiën (min. E. (Eelco) Heinen); co-signed by the Staatssecretaris van Justitie en Veiligheid"
    tk_url: "https://www.tweedekamer.nl/kamerstukken/wetsvoorstellen/detail?qry=wetsvoorstel%3A36924&cfg=wetsvoorsteldetails"
    ek_url: "https://www.eerstekamer.nl/wetsvoorstel/36924_implementatiewet_herziene"
    wetgevingskalender: "https://wetgevingskalender.overheid.nl/Regeling/WGK026364"
    consultation: "2025-04-15 .. 2025-05-13"
  besluit:
    title: "Implementatiebesluit herziene richtlijn consumentenkrediet (AMvB — wijziging BGfo, Besluit kredietvergoeding, Besluit bestuurlijke boetes financiële sector)"
    ketenid: "WGK026387"
    wetgevingskalender: "https://wetgevingskalender.overheid.nl/Regeling/WGK026387"
    consultation: "2025-12-22 .. 2026-02-02"
  supervisor: "AFM (Autoriteit Financiële Markten)"

# --- The live tracking: EU enforcement --------------------------------------
infringement:
  status: "Letter of formal notice (January infringements package INF/26/115), 2026-01-30 — non-communication of complete transposition; 2-month response window; possible reasoned opinion thereafter"
  member_states: 23
  source: "https://ec.europa.eu/commission/presscorner/detail/en/inf_26_115"

# The per-version operative-text file set under extracts/. DIRECTIVE ADAPTATION:
# these are THEMATIC slices shared by both layers — extracts/directive/ files use
# directive article/recital anchors; extracts/transposition-nl/ files use Wft/BW
# article anchors. (The directive and the Dutch bill renumber differently, so a
# shared thematic skeleton keeps the analysis links stable across both.)
# DIRECTIVE adaptation: the two layers follow each instrument's OWN structure (the directive by its
# chapters; the Dutch bill by its ARTIKEL structure), so the slice lists differ between layers.
extract_slices:
  # extracts/directive/ — grouped by the directive's chapters; ALL 50 articles + all recitals + annexes:
  - general-provisions                       # Ch I (arts 1-6): subject matter, scope, definitions, non-discrimination (art 6 = minors basis)
  - precontractual-information               # Ch II (arts 7-13): advertising + pre-contractual SECCI
  - tying-advisory-unsolicited               # Ch III (arts 14-17)
  - creditworthiness-database                # Ch IV (arts 18-19): incl. art 18(3) special-categories/social-network ban
  - agreement-form-modifications             # Ch V-VI
  - overdraft-withdrawal-repayment           # Ch VII-VIII (incl. withdrawal, early repayment)
  - apr-conduct                              # Ch IX-X (APR & cost caps; conduct & staff)
  - forbearance-intermediaries-authorities   # Ch XI-XIV (arts 35-36 forbearance/arrears)
  - final-provisions                         # Ch XV (repeal art 47, transposition 48, entry into force 49)
  - recitals
  - annexes
  # extracts/transposition-nl/ — grouped by the bill's own ARTIKEL structure:
  - 36924_artikel-I-wft                      # Wft (incl. 4:34a special categories, 4:34b minors, 4:35b arrears)
  - 36924_artikel-II-bw7                     # BW Boek 7 (incl. 7:75(4) minors voidable, 7:68a referral, 7:77 tying)
  - 36924_artikel-III-whc                    # Wet handhaving consumentenbescherming
  - 36924_artikel-IV-overgangswet            # Overgangswet NBW (art 211aa)
  - 36924_slotbepalingen                     # inwerkingtreding (deferred-debit +6m) + citeertitel
  - amvb_implementatiebesluit                # AMvB [draft]: BGfo advertising + thresholds, Besluit kredietvergoeding

# OLP actor skeleton — N/A for an adopted directive. STATUS.md uses an EU-instrument
# block (directive + Commission-as-enforcer) and an NL-transposition block instead.
co_legislators: {}
advisory_bodies: []          # N/A; NL consultation responders are tracked in docs/stakeholders.md

# ============================================================================
# Watchlist — the sources the daily tracker monitors. Consumed by
# .claude/skills/resolve-tracker-issue and mirrored in the cron prompt
# (~/law-tracker/prompt-ccd2.md) — keep the two in sync.
#   tier        T1 (institutional) | T2 (stakeholder) | T3 (social)
#   kind        institutional | stakeholder | social
#   label       human-readable name (matches the issue body "**Source:**")
#   url         watched URL
#   affects     downstream files/dirs to review on a substantive hit
#   notes       fetch quirks / scope rules
# ============================================================================
watchlist:
  sources:
    # --- Tier 1: institutional (EU + NL) -----------------------------------
    T1-01:
      tier: T1
      kind: institutional
      label: "EUR-Lex NIM — national transposition measures (CELEX 32023L2225)"
      url: "https://eur-lex.europa.eu/legal-content/EN/NIM/?uri=CELEX:32023L2225"
      affects: [STATUS.md, TIMELINE.md, docs/infringement.md]
      notes: "Watches which Member States have communicated transposition. A new NL measure here = transposition (partially) complete. EUR-Lex legal-content intermittently serves an AWS-WAF challenge (HTTP 202, ~2KB awswaf page) to plain curl — on a challenge, refetch via ~/law-tracker/lib/fetch_blocked_doc.py (browser tier solves it; verified 2026-07-08) before treating the source as unreachable."
    T1-02:
      tier: T1
      kind: institutional
      label: "Tweede Kamer — dossier 36924 (Implementatiewet)"
      url: "https://www.tweedekamer.nl/kamerstukken/wetsvoorstellen/detail?qry=wetsvoorstel%3A36924&cfg=wetsvoorsteldetails"
      doc_listing_url: "https://www.tweedekamer.nl/zoeken?qry=36924&fld_tk_categorie=Kamerstukken&srt=date%3Adesc%3Adate"
      affects: [STATUS.md, TIMELINE.md, docs/transposition/nl-pipeline.md, data/positions.csv]
      notes: "HIGHEST PRIORITY. Next expected: plenary debate/vote (the nota naar aanleiding van het verslag landed 23 Jun 2026 as 36924-8, alongside the brief regering 36924-7). Bot-sensitive host — curl with a desktop User-Agent. CAVEAT 1 (document discovery): on the detail page (url) recent documents are collapsed behind an extra 'toon meer' click, so newly-published docs may not appear — enumerate documents from doc_listing_url (the search page lists them directly, no click). CAVEAT 2 (existence check): to confirm a document exists, query the TK OData Document feed by SUBJECT, not by dossier link — Document?$filter=contains(tolower(Onderwerp),'consumentenkrediet'). The dossier-link filter (Kamerstukdossier/any(k:k/Nummer eq 36924)) MISSES freshly-published docs: they carry Volgnummer -1 and an empty Kamerstukdossier link until metadata is assigned later. A Volgnummer -1 / unlinked document is still real — do NOT treat its absence from the dossier-link query as non-existence (this caused the #15 false 'misdetection'). CAVEAT 3 (dates): committee activity/meeting dates extracted from the HTML are unreliable (the LLM misdates them) — verify each against the OData Activiteit feed (gegevensmagazijn.tweedekamer.nl/OData/v4/2.0/Activiteit, filter Onderwerp contains 'consumentenkrediet') before asserting it."
    T1-03:
      tier: T1
      kind: institutional
      label: "Eerste Kamer — dossier 36924"
      url: "https://www.eerstekamer.nl/wetsvoorstel/36924_implementatiewet_herziene"
      affects: [STATUS.md, TIMELINE.md, docs/transposition/nl-pipeline.md]
      notes: "Currently 'in behandeling bij de Tweede Kamer'. Watch for EK referral after a TK vote. Bot-sensitive host."
    T1-04:
      tier: T1
      kind: institutional
      label: "Wetgevingskalender — wet (WGK026364)"
      url: "https://wetgevingskalender.overheid.nl/Regeling/WGK026364"
      affects: [STATUS.md, TIMELINE.md]
    T1-05:
      tier: T1
      kind: institutional
      label: "Wetgevingskalender — Implementatiebesluit (WGK026387)"
      url: "https://wetgevingskalender.overheid.nl/Regeling/WGK026387"
      affects: [docs/transposition/implementatiebesluit.md, TIMELINE.md]
    T1-06:
      tier: T1
      kind: institutional
      label: "internetconsultatie — Implementatiebesluit"
      url: "https://www.internetconsultatie.nl/implementatiebesluitrichtlijnconsumentenkrediet/b1"
      affects: [docs/transposition/implementatiebesluit.md, docs/stakeholders.md]
    T1-07:
      tier: T1
      kind: institutional
      label: "AFM — CCDII sector page"
      url: "https://www.afm.nl/nl-nl/sector/kredietaanbieders/herziene-richtlijn-consumentenkrediet-ccdii"
      affects: [docs/transposition/supervision-afm.md, STATUS.md]
      notes: >-
        Canonical URL since AFM's Jun 2026 restructure (dropped the `4-` prefix — health issues #11/#25;
        the old URL soft-404s/flaps, do not revert). prompt-ccd2.md synced 20 Jul 2026.
    T1-08:
      tier: T1
      kind: institutional
      label: "EU Commission — infringement press corner (CCD2 / NL)"
      url: "https://ec.europa.eu/commission/presscorner/detail/en/inf_26_115"
      affects: [docs/infringement.md, STATUS.md, TIMELINE.md]
      notes: "Watch for escalation: a reasoned opinion or referral to the CJEU following the 30 Jan 2026 letter of formal notice."
    T1-09:
      tier: T1
      kind: institutional
      label: "officielebekendmakingen.nl — Kamervragen (vragen + Aanhangsel) BNPL / achteraf betalen"
      url: "https://zoek.officielebekendmakingen.nl/rss?q=(c.product-area==%22officielepublicaties%22)and(((w.publicatienaam==%22Kamervragen+(Aanhangsel)%22)or(w.publicatienaam==%22Kamervragen+zonder+antwoord%22)))and((cql.textAndIndexes=%22BNPL%22)or(cql.textAndIndexes=%22Klarna%22)or(cql.textAndIndexes=%22achteraf+betalen%22)or(cql.textAndIndexes=%22buy+now+pay+later%22))&svel=Publicatiedatum&svol=Aflopend"
      affects: [docs/transposition/nl-pipeline.md, TIMELINE.md, STATUS.md]
      notes: >-
        RSS, newest-first. Captures Tweede Kamer schriftelijke vragen (kv-tk-…) AND the later answers in
        the Aanhangsel (ah-tk-…, incl. uitstel-beantwoording postponements) on Buy Now Pay Later / Klarna /
        achteraf betalen — the conduct CCD2 brings into scope. A kv-tk hit = question filed (NL position
        not yet stated); an ah-tk hit = government answer (substantive). Broad capture: in-scope even when
        the item never names 2023/2225 or bill 36924. ~90% of feed items are on-topic; the cron's
        Dutch-language scope rule filters the rest on the <description> line. Out of scope: the kept-apart
        NL files (NPL kredietservicers/kredietkopers; kredietregistratie WGK025409) and pure
        schuldhulpverlening / flitskrediet / woekerrente questions with no BNPL angle. Route substance to
        the Kamervragen subsection of docs/transposition/nl-pipeline.md + TIMELINE.
    T1-10:
      tier: T1
      kind: institutional
      label: "officielebekendmakingen.nl — Kamervragen (vragen + Aanhangsel) kredietwaardigheid × persoonsgegevens"
      url: "https://zoek.officielebekendmakingen.nl/rss?q=(c.product-area==%22officielepublicaties%22)and(((w.publicatienaam==%22Kamervragen+(Aanhangsel)%22)or(w.publicatienaam==%22Kamervragen+zonder+antwoord%22)))and(((cql.textAndIndexes=%22kredietwaardigheid%22)and(cql.textAndIndexes=%22persoonsgegevens%22))or((cql.textAndIndexes=%22bijzondere%22)and(cql.textAndIndexes=%22persoonsgegevens%22)and(cql.textAndIndexes=%22krediet%22)))&svel=Publicatiedatum&svol=Aflopend"
      affects: [docs/provisions/creditworthiness.md, docs/transposition/nl-pipeline.md, TIMELINE.md]
      notes: >-
        Covers the data-protection facet of the creditworthiness assessment that the BNPL feed (T1-09)
        cannot catch: CCD2 art 18(3) / the new Wft 4:34a ban on using bijzondere categorieën van
        persoonsgegevens (GDPR art 9, incl. gezondheidsgegevens) and data from sociale netwerken in
        kredietwaardigheidsbeoordeling, plus profiling/scoring questions. As of Jun 2026 NO open Kamervraag
        targets this article — the ~21 feed items are historical/answered (automated kredietchecks, BKR
        registration, trading in kredietgegevens). A NEW kv-tk-… on special-category / social-network data
        in credit scoring is a genuine hit → route to docs/provisions/creditworthiness.md. Ignore items
        that only incidentally pair the words (e.g. emancipatie/digitalisering).
    T1-11:
      tier: T1
      kind: institutional
      label: "AFM — CCDII: drie doorlopende verplichtingen"
      url: "https://www.afm.nl/nl-nl/sector/kredietaanbieders/ccdii--doorlopende-verplichtingen"
      affects: [docs/transposition/supervision-afm.md, docs/provisions/creditworthiness.md, STATUS.md]
      notes: >-
        AFM sub-page added in the Jun 2026 restructure (surfaced via health issue #11, added as a
        watched source 20 Jul 2026): the three doorlopende verplichtingen under CCDII — verantwoorde
        kredietverlening (kredietwaardigheidstoets, Wft 4:34a), leeftijdsverificatie (ban on credit to
        minors) and preventief beheer. Route kredietwaardigheid-norm hits to
        docs/provisions/creditworthiness.md.
    # --- Tier 2: sector / NGO / law firm -----------------------------------
    T2-01:
      tier: T2
      kind: stakeholder
      label: "VFN — Vereniging van Financieringsondernemingen in Nederland (CCD II updates)"
      url: "https://www.vfn.nl/algemeen/update-herziene-richtlijn-consumentenkrediet-ccd-ii/"
      affects: [docs/stakeholders.md, docs/fault-lines.md]
    T2-02:
      tier: T2
      kind: stakeholder
      label: "Betaalvereniging Nederland — news"
      url: "https://www.betaalvereniging.nl/actueel/nieuws/"
      affects: [docs/stakeholders.md, docs/fault-lines.md]
